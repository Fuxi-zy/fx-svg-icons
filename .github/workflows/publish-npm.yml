name: 发布到 npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布标签 (latest / alpha / beta)'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: pnpm install

      - run: pnpm build
      - run: pnpm --filter @fuxishi/svg-icon-element-plus-picker build
      - run: pnpm --filter @fuxishi/svg-icon-naive-picker build
      - run: pnpm --filter @fuxishi/svg-icon-antdv-picker build
      - run: pnpm --filter @fuxishi/svg-icon-tdesign-picker build
      - run: pnpm --filter @fuxishi/svg-icon-vanilla-picker build

      - name: 判断发布标签
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
              echo "tag=alpha" >> $GITHUB_OUTPUT
            else
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 发布主包
        run: npm publish --access public --tag ${{ steps.release-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FUXISHI }}
      - name: 发布 Element Plus Picker
        run: cd pickers/element-plus && npm publish --access public --tag ${{ steps.release-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FUXISHI }}
      - name: 发布 Naive UI Picker
        run: cd pickers/naive && npm publish --access public --tag ${{ steps.release-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FUXISHI }}
      - name: 发布 AntDv Picker
        run: cd pickers/antdv && npm publish --access public --tag ${{ steps.release-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FUXISHI }}
      - name: 发布 TDesign Picker
        run: cd pickers/tdesign && npm publish --access public --tag ${{ steps.release-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FUXISHI }}
      - name: 发布 Vanilla Picker
        run: cd pickers/vanilla && npm publish --access public --tag ${{ steps.release-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FUXISHI }}
