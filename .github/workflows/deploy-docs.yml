name: 部署文档

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm build
      - run: pnpm --filter @fuxishi/svg-icon-element-plus-picker build
      - run: pnpm --filter @fuxishi/svg-icon-naive-picker build
      - run: pnpm --filter @fuxishi/svg-icon-antdv-picker build
      - run: pnpm --filter @fuxishi/svg-icon-tdesign-picker build
      - run: pnpm --filter @fuxishi/svg-icon-vanilla-picker build

      - run: pnpm --filter demo-element-plus build
      - run: pnpm --filter demo-naive build
      - run: pnpm --filter demo-antdv-next build
      - run: pnpm --filter demo-tdesign build
      - run: pnpm --filter demo-custom build
      - run: pnpm --filter demo-vanilla build

      - run: pnpm --filter @fuxishi/svg-icon-docs build

      - run: |
          mkdir -p fx-svg-icons-docs/.vitepress/dist/demos
          cp -r demos/demo-element-plus/dist fx-svg-icons-docs/.vitepress/dist/demos/element-plus
          cp -r demos/demo-naive/dist fx-svg-icons-docs/.vitepress/dist/demos/naive
          cp -r demos/demo-antdv-next/dist fx-svg-icons-docs/.vitepress/dist/demos/antdv-next
          cp -r demos/demo-tdesign/dist fx-svg-icons-docs/.vitepress/dist/demos/tdesign
          cp -r demos/demo-custom/dist fx-svg-icons-docs/.vitepress/dist/demos/custom
          cp -r demos/demo-vanilla/dist fx-svg-icons-docs/.vitepress/dist/demos/vanilla

      - uses: actions/upload-pages-artifact@v3
        with:
          path: fx-svg-icons-docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
