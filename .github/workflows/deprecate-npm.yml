name: 废弃 npm 版本

on:
  workflow_dispatch:
    inputs:
      versions:
        description: '要废弃的版本号，多个用逗号分隔（如 1.0.2,1.0.3）'
        required: true
        type: string
      message:
        description: '废弃说明'
        required: false
        default: '此版本已废弃，请升级到最新版本'
        type: string

permissions:
  contents: read

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: 废弃指定版本
        env:
          NODE_AUTH_TOKEN: ${{ secrets.FUXISHI }}
        run: |
          PACKAGES=(
            "@fuxishi/svg-icon"
            "@fuxishi/svg-icon-element-plus-picker"
            "@fuxishi/svg-icon-naive-picker"
            "@fuxishi/svg-icon-antdv-picker"
            "@fuxishi/svg-icon-tdesign-picker"
            "@fuxishi/svg-icon-vanilla-picker"
          )
          IFS=',' read -ra VERSIONS <<< "${{ inputs.versions }}"
          for pkg in "${PACKAGES[@]}"; do
            for v in "${VERSIONS[@]}"; do
              v=$(echo "$v" | xargs)
              echo "废弃 ${pkg}@${v} ..."
              npm deprecate "${pkg}@${v}" "${{ inputs.message }}" --registry=https://registry.npmjs.org/ || true
            done
          done
